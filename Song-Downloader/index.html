<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song Downloader</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>Song Downloader</h1>

      <div class="platform-logos">
        <!-- Spotify -->
        <svg class="platform-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#1DB954"/>
          <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.4-.85 13.1 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.3.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.1-.75-.45-.1-.3.1-.65.45-.75 3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z" fill="white"/>
        </svg>

        <!-- YouTube -->
        <svg class="platform-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="5" fill="#FF0000"/>
          <path d="M19.6 7.8s-.2-1.3-.8-1.9c-.7-.8-1.6-.8-2-.8C14.4 5 12 5 12 5s-2.4 0-4.8.1c-.4 0-1.3.1-2 .8-.6.6-.8 1.9-.8 1.9S4.2 9.3 4.2 10.7v1.3c0 1.4.2 2.8.2 2.8s.2 1.3.8 1.9c.7.8 1.7.7 2.2.8C8.8 17.6 12 17.6 12 17.6s2.4 0 4.8-.2c.4 0 1.3-.1 2-.8.6-.6.8-1.9.8-1.9s.2-1.4.2-2.8v-1.3C19.8 9.3 19.6 7.8 19.6 7.8zM10.2 14.4V9.6l5.4 2.4-5.4 2.4z" fill="white"/>
        </svg>

        <!-- SoundCloud -->
        <svg class="platform-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="5" fill="#FF5500"/>
          <path d="M3 14.5c0 1.1.9 2 2 2h12.5c1.4 0 2.5-1.1 2.5-2.5 0-1.2-.85-2.2-2-2.45V11.5c0-1.65-1.35-3-3-3-.55 0-1.05.15-1.5.4C12.85 7.6 11.5 6.5 10 6.5c-1.95 0-3.5 1.55-3.5 3.5v.1C5.1 10.5 4 11.65 4 13c0 .5.15.95.4 1.35C3.55 14 3 14 3 14.5z" fill="white"/>
          <rect x="3" y="12" width="1" height="3" rx="0.5" fill="white" opacity="0.6"/>
          <rect x="5" y="11" width="1" height="4" rx="0.5" fill="white" opacity="0.8"/>
          <rect x="7" y="10.5" width="1" height="5" rx="0.5" fill="white"/>
        </svg>
      </div>

      <div class="form-group">
        <label for="url-input">URL</label>
        <input id="url-input" type="text" placeholder="Spotify, YouTube or SoundCloud link" />
      </div>

      <div class="form-group">
        <label for="format-select">Format</label>
        <select id="format-select">
          <option value="mp3">MP3 320kbps</option>
          <option value="aiff">AIFF</option>
        </select>
      </div>

      <div class="form-group">
        <label for="output-path">Output folder</label>
        <div class="folder-row">
          <input id="output-path" type="text" placeholder="Choose a folder..." readonly />
          <button id="browse-btn" type="button">Browse</button>
        </div>
      </div>

      <button id="download-btn" type="button">Download</button>

      <div id="log"></div>
    </main>
  </body>
</html>
